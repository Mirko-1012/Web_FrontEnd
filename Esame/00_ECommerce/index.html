<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ECommerce</title>
</head>
<body>
    
    <div class="card">
        <div class="image-div">
            <button class="wishlist-btn">🤍</button>

            <div class="sneakers"></div>

            <div class="badge-father">
                <span class="badge code">CAMBIO20</span>
                <span class="badge promo">PROMO</span>
            </div>
        </div>
        <div class="product-info">
            <h3>Calvin Klein</h3>
            <p class="title">Sneakers basse - off white/navy</p>

            <p class="price">76,99 €</p>
            <p class="old-price">Prezzo mediano: <span>109,99 €</span> -30%</p>
        </div>
    </div>
    
</body>
</html>
